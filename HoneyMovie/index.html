<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="HoneyMovie — Discover films, read reviews, and build your watchlist." />
  <title>HoneyMovie — Discover & Review</title>
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/theme.js" defer></script>
</head>
<body class="page-home">
  <div class="site-header-sticky" id="site-header">
    <header class="navbar">
      <a href="index.html" class="logo">HoneyMovie</a>
      <nav class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="mylist.html">My List</a>
      </nav>
      <div class="nav-actions">
        <div class="nav-mylist-wrap">
          <a href="mylist.html" class="btn-icon" title="My List" aria-label="My List">📋</a>
          <span class="badge-count hidden" data-mylist-count>0</span>
        </div>
        <button type="button" class="btn-icon" data-theme-toggle aria-label="Toggle theme">
          <span data-theme-icon>☀️</span>
        </button>
        <button type="button" class="nav-toggle" data-nav-toggle aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <div class="search-bar" id="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
        </span>
        <input type="search" id="search-input" placeholder="Search movies…" aria-label="Search movies" autocomplete="off" />
        <button type="button" class="search-clear hidden" id="search-clear" aria-label="Clear search">×</button>
      </div>
      <select id="genre-filter" aria-label="Filter by genre">
        <option value="all">All Genres</option>
      </select>
      <select id="sort-filter" aria-label="Sort movies">
        <option value="default">Sort: Default</option>
        <option value="rating">Sort: Rating</option>
        <option value="year">Sort: Year</option>
      </select>
    </div>
  </div>

  <div class="page-content" id="page-content">
    <section class="hero home-browse" aria-label="Featured movies">
      <div class="hero-slides" id="hero-slides"></div>
      <div class="hero-dots" id="hero-dots"></div>
    </section>

    <main>
      <section id="search-section" class="search-results-panel hidden">
        <h2 class="disney-section-heading"><span class="disney-pipe">|</span> MOVIES</h2>
        <div class="carousel-row search-carousel-row" id="search-carousel">
          <div class="carousel-track search-results-track" id="search-track"></div>
          <button type="button" class="carousel-btn next search-carousel-next" aria-label="Scroll right">›</button>
        </div>
        <p id="search-empty" class="search-empty hidden">No titles found for your search.</p>
      </section>

      <div class="home-browse" id="home-browse">
        <section id="row-new" class="section home-section">
          <h2 class="section-title">New Releases</h2>
          <div class="carousel-row">
            <button type="button" class="carousel-btn prev" aria-label="Scroll left">‹</button>
            <div class="carousel-track"></div>
            <button type="button" class="carousel-btn next" aria-label="Scroll right">›</button>
          </div>
        </section>

        <section id="row-trending" class="section home-section">
          <h2 class="section-title">Trending Now</h2>
          <div class="carousel-row">
            <button type="button" class="carousel-btn prev" aria-label="Scroll left">‹</button>
            <div class="carousel-track"></div>
            <button type="button" class="carousel-btn next" aria-label="Scroll right">›</button>
          </div>
        </section>

        <section id="row-top" class="section home-section">
          <h2 class="section-title">Top Rated</h2>
          <div class="carousel-row">
            <button type="button" class="carousel-btn prev" aria-label="Scroll left">‹</button>
            <div class="carousel-track"></div>
            <button type="button" class="carousel-btn next" aria-label="Scroll right">›</button>
          </div>
        </section>

        <section id="row-rec" class="section home-section">
          <h2 class="section-title">Recommended For You</h2>
          <div class="carousel-row">
            <button type="button" class="carousel-btn prev" aria-label="Scroll left">‹</button>
            <div class="carousel-track"></div>
            <button type="button" class="carousel-btn next" aria-label="Scroll right">›</button>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer home-browse">
      <p>HoneyMovie — Movie discovery &amp; reviews. No streaming. Information only.</p>
    </footer>
  </div>

  <script src="js/movies.js"></script>
  <script src="js/reviews.js"></script>
  <script src="js/mylist.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
